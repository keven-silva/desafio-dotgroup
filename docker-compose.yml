services:
  postgres:
    image: postgres:16-alpine
    container_name: dotgroup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dotgroup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dotgroup}
      POSTGRES_DB: ${POSTGRES_DB:-library}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dotgroup-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dotgroup}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dotgroup-postgres-data:
